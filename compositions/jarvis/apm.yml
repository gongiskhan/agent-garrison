name: jarvis-agentic-os
version: 0.1.0
target: claude
dependencies:
  apm:
    - path: ../../fittings/seed/local-voice
    - path: ../../fittings/seed/garrison-orchestrator
    - path: ../../fittings/seed/http-gateway
    - path: ../../fittings/seed/jarvis-os
    - path: ../../fittings/seed/knowledge
x-garrison:
  composition:
    id: jarvis
    name: Jarvis Agentic OS
    global_config:
      projects_root: ~/dev
      vault: default
      platform: claude-code
      guardrails:
        max_tasks_per_tick: 10
        max_spend_per_day: 250
        max_tool_calls_per_tick: 300
      permissions_mode: auto
      observability_config:
        log_sink: runner
    selections:
      orchestrator:
        - id: garrison-orchestrator
          config: {}
      channels:
        - id: jarvis-os
          config:
            port: 7092
            bind_host: 127.0.0.1
            gateway_url: ''
            # Smart endpointing (2026-07-02): Silero closes a segment after
            # vad_redemption_ms of silence, then an ADAPTIVE grace window decides
            # the real end of turn — short (endpoint_min_ms) when the transcript
            # sounds finished, long (endpoint_max_ms) when it sounds mid-thought
            # ("quero que…", trailing "e", comma, ellipsis). Speaking again inside
            # the window merges into the same turn. Effective pause before send:
            # finished ≈ 0.9s (550+350), mid-thought up to ≈ 3.2s (550+2600).
            vad_redemption_ms: 550
            endpoint_min_ms: 350
            endpoint_max_ms: 2600
            # Barge-in (2026-07-02): o mic fica aberto enquanto o Jarvis pensa E
            # fala (full-duplex). Fala sustentada (bargein_confirm_ms de frames
            # ≥ bargein_prob, sobre o sinal já com echo-cancellation do browser)
            # corta o TTS, cancela a geração em curso no orchestrator e abre um
            # novo turno. Falsos disparos com colunas altas → subir confirm_ms /
            # prob; 0 desliga o barge-in.
            bargein_confirm_ms: 350
            bargein_prob: 0.55
        - id: local-voice
          config:
            port: 7090
            bind_host: 127.0.0.1
            kokoro_voice: bm_george
            # Spoken cadence: seconds of silence inserted after each punctuation
            # boundary so the reply breathes instead of running together. Bigger
            # boundary → longer pause (comma ticks, full stop breathes, a
            # paragraph/topic change gets a real beat). Projected to the voice
            # server as PAUSE_* / MIN_CLAUSE env vars. Verified 2026-07-01 on the
            # live Piper pt_PT path — measured gaps matched these to the ms.
            # Pauses trimmed ~30% for a snappier spoken cadence (2026-07-01).
            # Zero STT/precision impact — this only shortens the silence the reply
            # inserts between clauses. Original values kept here for a clean revert:
            #   comma 0.12 · clause 0.22 · sentence 0.32 · question 0.38 · ellipsis 0.48 · para 0.6
            pause_comma: 0.08       # ,
            pause_clause: 0.15      # ; :  — –
            pause_sentence: 0.22    # .
            pause_question: 0.27    # ! ?
            pause_ellipsis: 0.34    # … / ...
            pause_para: 0.42        # line break / paragraph / topic change
            min_clause: 26          # a comma only becomes its own pause past this many chars
            # large-v3 is the only checkpoint that transcribes European Portuguese
            # reliably. Round-trip test on clean audio ("Que horas são em Lisboa?"):
            # small → "Então é só uma luz boa"; medium → "Então horas são é Lisboa";
            # large-v3-turbo → "Então, olha só em Lisboa"; large-v3 → exact. Costs
            # ~5-6s decode on CPU (no CUDA on this Mac) + a one-time ~30s warm load.
            # Accuracy over latency: a fast wrong transcript is useless downstream.
            whisper_model: large-v3
            # Pinned to Portuguese. Bilingual auto-detect was tried but on real
            # short mic clips whisper.cpp flips wildly (PT heard as es/fr/en →
            # garbage transcripts) AND makes the TTS voice switch mid-reply. This
            # user is PT-primary, so pin STT to pt and force the TTS voice to pt
            # (tts_force_lang) — stable, no flipping, no voice-mixing. Cost:
            # English is decoded as PT (large-v3 still handles clear EN acceptably,
            # but it's no longer first-class). Flip back to bilingual by clearing
            # whisper_lang + tts_force_lang.
            whisper_lang: pt
            tts_force_lang: pt
            # NO whisper_prompt: a content-rich initial_prompt makes large-v3
            # REGURGITATE the prompt text on unclear real-mic audio — verified in
            # the field, a user utterance came back as "Liga as luzes da sala,
            # marca um email" (verbatim from the old prompt). small needed the
            # prime; large-v3 is strong without it, so leave it empty.
            # STT on the Apple GPU (Metal) via whisper.cpp — ~3x faster than
            # faster-whisper's CPU int8, same large-v3 weights. setup.sh installs
            # whisper-cpp + the ggml model.
            stt_engine: whisper-cpp
            whisper_cpp_model: ~/.cache/whisper-cpp/ggml-large-v3.bin
            stt_normalize_gain: "on"
            wake_word: "off"
      gateway:
        - id: http-gateway
          config:
            port: 4777
            bind_host: 127.0.0.1
            orchestrator_mode: true
            model: haiku
      memory:
        - id: knowledge
          config:
            vault_dir: vault
    prompt_sources:
      orchestrator: .garrison/prompts/orchestrator.md
      soul: .garrison/prompts/soul.md
