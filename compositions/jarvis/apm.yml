name: jarvis-agentic-os
version: 0.1.0
target: claude
dependencies:
  apm:
    - path: ../../fittings/seed/local-voice
    - path: ../../fittings/seed/garrison-orchestrator
    - path: ../../fittings/seed/http-gateway
    - path: ../../fittings/seed/jarvis-os
    - path: ../../fittings/seed/knowledge
    # Installed-only (not the active voice selection): kept available so the
    # voice e2e harness can start it on 7085 to benchmark/compare against the
    # local-voice STT. local-voice is the production voice (no key, better PT).
    - path: ../../fittings/seed/deepgram-voice
x-garrison:
  composition:
    id: jarvis
    name: Jarvis Agentic OS
    global_config:
      projects_root: ~/dev
      vault: default
      platform: claude-code
      guardrails:
        max_tasks_per_tick: 10
        max_spend_per_day: 250
        max_tool_calls_per_tick: 300
      permissions_mode: auto
      observability_config:
        log_sink: runner
    selections:
      orchestrator:
        - id: garrison-orchestrator
          config: {}
      channels:
        - id: jarvis-os
          config:
            port: 7092
            bind_host: 127.0.0.1
            gateway_url: ''
        - id: local-voice
          config:
            port: 7090
            bind_host: 127.0.0.1
            kokoro_voice: bm_george
            whisper_model: small
            # Pin STT to Portuguese. With `small` (multilingual) and NO pin,
            # whisper's per-utterance auto-detect flips to EN on short/imperfect
            # audio and transcribes PT as English garbage ("liga as luzes" →
            # "Liga's loses to Sella"), so the Orchestrator never understands the
            # phrase. Pinning forces Portuguese decoding. See voice-server/server.py.
            whisper_lang: pt
            # Bias whisper toward the assistant's domain vocabulary. whisper-small
            # mishears real-mic Portuguese WITHOUT context ("liga as luzes da sala"
            # → "a liga é luz da ação"); a natural-language prime with example
            # commands fixes it (verified on real captured mic clips). Safe now that
            # the language is pinned — an initial_prompt no longer skews detection.
            whisper_prompt: "Estou a falar em português com o meu assistente Jarvis. Por exemplo: liga as luzes da sala, marca uma reunião amanhã, que horas são, abre o email."
            wake_word: "off"
      gateway:
        - id: http-gateway
          config:
            port: 4777
            bind_host: 127.0.0.1
            orchestrator_mode: true
            model: haiku
      memory:
        - id: knowledge
          config:
            vault_dir: vault
    prompt_sources:
      orchestrator: .garrison/prompts/orchestrator.md
      soul: .garrison/prompts/soul.md
