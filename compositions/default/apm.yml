name: dogfood-operative
version: 0.1.0
target: claude
dependencies:
  apm:
    - path: ../../fittings/seed/artifact-store
    - path: ../../fittings/seed/browser-automation
    - path: ../../fittings/seed/coding-subagent
    - path: ../../fittings/seed/documents
    - path: ../../fittings/seed/google-calendar
    - path: ../../fittings/seed/http-gateway
    - path: ../../fittings/seed/loop-heartbeat
    - path: ../../fittings/seed/memory
    - path: ../../fittings/seed/morning-briefing
    - path: ../../fittings/seed/personal-operative
    - path: ../../fittings/seed/projects-index
    - path: ../../fittings/seed/scheduler
    - path: ../../fittings/seed/slack-channel
    - path: ../../fittings/seed/soul
    - path: ../../fittings/seed/tier-classifier
    - path: ../../fittings/seed/trello-data-source
    - path: ../../fittings/seed/terminal-armory-default
    - path: ../../fittings/seed/screen-share-default
    - path: ../../fittings/seed/worktree-management-sequoias
    - path: ../../fittings/seed/session-view-sequoias
    - path: ../../fittings/seed/outpost-actions
    - path: ../../fittings/seed/vault-sync
x-garrison:
  composition:
    id: default
    name: Dogfood Operative
    global_config:
      projects_root: ~/dev
      vault: default
      platform: claude-code
      guardrails:
        max_tasks_per_tick: 5
        max_spend_per_day: 25
        max_tool_calls_per_tick: 30
      permissions_mode: auto
      observability_config:
        log_sink: runner
    selections:
      artifact-store:
        - id: artifact-store
          config:
            storage_root: artifacts
      heartbeat:
        - id: loop-heartbeat
          config:
            cadence_minutes: 40
            gateway_url: http://127.0.0.1:4777/jobs
      data-sources:
        - id: trello-data-source
          config:
            tasks_truth_file: tasks/trello.md
            board_id: vl1Z8KFH
      automations:
        - id: browser-automation
          config:
            browser: chromium
            headless: false
      knowledge-base:
        - id: projects-index
          config:
            projects_root: ~/Projects
        - id: documents
          config: {}
      scheduler:
        - id: scheduler
          config:
            jobs_file: data/scheduler-jobs.json
            log_file: data/scheduler.log
      memory:
        - id: memory
          config:
            recency_window: 20
            persistence_cadence: hourly
            compiled_memory_path: memory/compiled.md
      classifier:
        - id: tier-classifier
          config:
            tier_floor: 3
            plan_threshold: 3
      skills:
        - id: coding-subagent
          config:
            subagent_model: opus
            subagent_permission_mode: bypassPermissions
            max_plan_turns: 30
            max_execute_turns: 200
      gateway:
        - id: http-gateway
          config:
            port: 4777
            bind_host: 127.0.0.1
      channels:
        - id: slack-channel
          config:
            slack_port: 9512
            gateway_url: http://127.0.0.1:4777
            chat_timeout_ms: 600000
      soul:
        - id: soul
          config: {}
      orchestrator:
        - id: personal-operative
          config:
            tone: terse
            idle_behavior: passive
            priority_label: priority
            silent_when_no_work: true
            report_channel: ''
      terminal:
        - id: terminal-armory-default
          config: {}
      screen-share:
        - id: screen-share-default
          config: {}
      worktree-management:
        - id: worktree-management-sequoias
          config:
            repo_path: ~/Projects/agent-garrison
      session-view:
        - id: session-view-sequoias
          config: {}
    prompt_sources:
      orchestrator: .garrison/prompts/orchestrator.md
      soul: .garrison/prompts/soul.md
