name: dogfood-operative
version: 0.1.0
target: claude
dependencies:
  apm:
    - path: ../../fittings/seed/artifact-store
    - path: ../../fittings/seed/browser-default
    - path: ../../fittings/seed/deepgram-voice
    - path: ../../fittings/seed/garrison-orchestrator
    - path: ../../fittings/seed/http-gateway
    - path: ../../fittings/seed/memory
    - path: ../../fittings/seed/monitor-default
    - path: ../../fittings/seed/screen-share-default
    - path: ../../fittings/seed/session-view-sequoias
    - path: ../../fittings/seed/slack-channel
    - path: ../../fittings/seed/terminal-armory-default
    - path: ../../fittings/seed/trello-data-source
    - path: ../../fittings/seed/web-channel-default
    - path: ../../fittings/seed/workspaces
    - path: ../../fittings/seed/worktree-management-sequoias
x-garrison:
  composition:
    id: default
    name: Dogfood Operative
    global_config:
      projects_root: ~/dev
      vault: default
      platform: claude-code
      guardrails:
        max_tasks_per_tick: 10
        max_spend_per_day: 250
        max_tool_calls_per_tick: 300
      permissions_mode: auto
      observability_config:
        log_sink: runner
    selections:
      orchestrator:
        - id: garrison-orchestrator
          config: {}
      gateway:
        - id: http-gateway
          config:
            port: 4777
            bind_host: 127.0.0.1
      channels:
        - id: slack-channel
          config:
            slack_port: 9512
            gateway_url: http://127.0.0.1:4777
            chat_timeout_ms: 600000
        - id: web-channel-default
          config:
            port: 7083
            bind_host: 127.0.0.1
            gateway_url: ''
        - id: deepgram-voice
          config:
            port: 7085
            bind_host: 127.0.0.1
            stt_model: nova-2
            tts_model: aura-asteria-en
      memory:
        - id: memory
          config:
            recency_window: 20
            persistence_cadence: hourly
            compiled_memory_dir: ~/Projects/ekus/obsidian-vault/Compiled
            compiler_repo_url: https://github.com/coleam00/claude-memory-compiler
        - id: trello-data-source
          config:
            tasks_truth_file: tasks/trello.md
            board_id: vl1Z8KFH
      observability:
        - id: monitor-default
          config:
            port: 7077
            bind_host: 127.0.0.1
            poll_interval_ms: 1000
            log_retention_hours: 24
      sessions:
        - id: artifact-store
          config:
            storage_root: artifacts
        - id: workspaces
          config: {}
        - id: terminal-armory-default
          config: {}
        - id: screen-share-default
          config: {}
        - id: worktree-management-sequoias
          config:
            repo_path: ~/Projects/agent-garrison
        - id: session-view-sequoias
          config: {}
        - id: browser-default
          config:
            port: 7084
            bind_host: 127.0.0.1
            viewport_width: 1600
            viewport_height: 1200
            jpeg_quality: 70
            every_nth_frame: 1
    prompt_sources:
      orchestrator: .garrison/prompts/orchestrator.md
      soul: .garrison/prompts/soul.md
