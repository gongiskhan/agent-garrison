name: dogfood-operative
version: 0.1.0
target: claude
dependencies:
  apm:
    - path: ../../fittings/seed/automations
    - path: ../../fittings/seed/basic-memory
    - path: ../../fittings/seed/browser-default
    - path: ../../fittings/seed/codex-runtime
    - path: ../../fittings/seed/dev-env
    - path: ../../fittings/seed/file-browser
    - path: ../../fittings/seed/gemini-runtime
    - path: ../../fittings/seed/http-gateway
    - path: ../../fittings/seed/improver
    - path: ../../fittings/seed/kanban-loop
    - path: ../../fittings/seed/local-voice
    - path: ../../fittings/seed/model-router
    - path: ../../fittings/seed/modes
    - path: ../../fittings/seed/monitor-default
    - path: ../../fittings/seed/scheduler
    - path: ../../fittings/seed/screen-share-default
    - path: ../../fittings/seed/slack-channel
    - path: ../../fittings/seed/trello
    - path: ../../fittings/seed/vault-git-sync
    - path: ../../fittings/seed/web-channel-default
x-garrison:
  composition:
    id: default
    name: Dogfood Operative
    global_config:
      projects_root: ~/dev
      vault: default
      platform: claude-code
      guardrails:
        max_tasks_per_tick: 10
        max_spend_per_day: 250
        max_tool_calls_per_tick: 300
      permissions_mode: auto
      observability_config:
        log_sink: runner
    selections:
      orchestrator:
        - id: model-router
          config:
            port: 7087
            bind_host: 127.0.0.1
      channels:
        - id: slack-channel
          config:
            slack_port: 9512
            gateway_url: http://127.0.0.1:4777
            chat_timeout_ms: 600000
        - id: web-channel-default
          config:
            port: 7083
            bind_host: 127.0.0.1
            gateway_url: ''
        - id: local-voice
          config:
            port: 7090
            bind_host: 127.0.0.1
            kokoro_voice: bm_george
            kokoro_speed: 1
            # large-v3 transcribes European PT reliably (small mangles it).
            # Pinned to pt: bilingual auto-detect flips wildly on real short mic
            # clips (PT heard as es/fr/en) and switches the TTS voice mid-reply,
            # so pin STT to pt + force TTS voice to pt for a PT-primary user.
            # Clear whisper_lang + tts_force_lang to go back to bilingual.
            whisper_model: large-v3
            whisper_lang: pt
            tts_force_lang: pt
            # STT engine: whisper-cpp runs large-v3 on the Apple GPU (Metal) via a
            # supervised whisper-server, ~3x faster than faster-whisper's CPU int8
            # (~4s vs ~12s on a 33s clip), same weights so same accuracy. Falls
            # back to faster-whisper if set to that. Needs `brew install
            # whisper-cpp` + the ggml model (scripts/setup.sh fetches both).
            stt_engine: whisper-cpp
            whisper_cpp_model: ~/.cache/whisper-cpp/ggml-large-v3.bin
            stt_normalize_gain: 'on'
            lang_voices: ''
            piper_voices: ''
            wake_word: 'off'
            python_bin: ''
      gateway:
        - id: http-gateway
          config:
            port: 4777
            bind_host: 127.0.0.1
      runtimes:
        - id: codex-runtime
          config: {}
        - id: gemini-runtime
          config: {}
      memory:
        - id: basic-memory
          config:
            vault_dir: ~/ObsidianVault
            memory_dir: Memory
            project_name: main
            capture_enabled: true
            register_codex_gemini: true
      observability:
        - id: monitor-default
          config:
            port: 7077
            bind_host: 127.0.0.1
            poll_interval_ms: 1000
            log_retention_hours: 24
        - id: automations
          config:
            port: 7090
            bind_host: 127.0.0.1
        - id: improver
          config:
            port: 7088
            bind_host: 127.0.0.1
            cron: 30 3 * * *
            vault_dir: ~/ObsidianVault
            memory_primary: true
            checkpoint_retention_days: 14
            dream_model: haiku
        - id: scheduler
          config: {}
        - id: kanban-loop
          config:
            board_dir: ~/.garrison/kanban-loop
            iteration_cap: 10
            test_beat_cron: 0 */5 * * *
      sessions:
        - id: dev-env
          config:
            port: 7086
            bind_host: 127.0.0.1
        - id: file-browser
          config:
            port: 7091
            bind_host: 127.0.0.1
            root: ~/.garrison/files
        - id: vault-git-sync
          config:
            cron: 0 4 * * *
            vault_dir: ~/ObsidianVault
      surfaces:
        - id: screen-share-default
          config: {}
        - id: browser-default
          config:
            port: 7084
            bind_host: 127.0.0.1
            viewport_width: 1600
            viewport_height: 1200
            jpeg_quality: 70
            every_nth_frame: 1
      modes:
        - id: modes
          config:
            briefs_path: ./briefs/
            default_mode: gary
      connectors:
        - id: trello
          config:
            board_id: vl1Z8KFH
    prompt_sources:
      orchestrator: .garrison/prompts/orchestrator.md
      soul: .garrison/prompts/soul.md
