    targets:
      - id: cc-haiku
        runtime: claude-code
        model: haiku
        provider: anthropic-plan
        params:
          type: runtime-target
      - id: cc-ollama-qwen
        runtime: claude-code
        model: qwen2.5-coder
        provider: ollama-local
        params:
          type: runtime-target
      - id: cc-ollama-deepseek
        runtime: claude-code
        model: deepseek-coder-v2
        provider: ollama-local
        params:
          type: runtime-target
      - id: sec-gemini
        runtime: gemini
        model: gemini-2.5-flash
        params:
          type: secondary
      - id: sec-codex
        runtime: codex
        model: gpt-5-codex
        params:
          type: secondary
      - id: classifier
        runtime: claude-code
        model: haiku
        provider: anthropic-plan
        params:
          type: runtime-target
          pinned: true
      - id: sdk-ollama-chat
        runtime: agent-sdk
        model: qwen3:0.6b
        provider: ollama-local
        params:
          type: runtime-target
          promptMode: lean
      - id: sdk-ollama-build
        runtime: agent-sdk
        model: qwen2.5-coder:7b
        provider: ollama-local
        params:
          type: runtime-target
          promptMode: lean
          maxTurns: 2
          leanPrompt: >-
            You output JavaScript source code ONLY, as a single fenced code block. Example request:
            "a function add that sums two numbers". Example reply (this exact shape, nothing else):

            ```js

            export function add(a, b) {
              return a + b;
            }

            ```

            Rules: reply with ONLY one ```js fenced block containing the implementation. Never
            output JSON. Never emit keys like name, arguments, phase, schema, or label. Never call a
            tool. No prose before or after. No imports unless explicitly requested.
      - id: cc-opus
        runtime: claude-code
        model: opus
        provider: anthropic-plan
        params:
          type: runtime-target
      - id: cc-sonnet
        runtime: claude-code
        model: sonnet
        provider: anthropic-plan
        params:
          type: runtime-target
      - id: sdk-haiku
        runtime: agent-sdk
        model: claude-haiku-4-5
        provider: anthropic
        params:
          type: runtime-target
          authMode: api-key
      - id: sdk-ollama-probe
        runtime: agent-sdk
        model: qwen2.5:3b
        provider: ollama-local
        params:
          type: runtime-target
          promptMode: lean
      - id: sol
        runtime: codex
        model: gpt-5.6-sol
        provider: anthropic
        params:
          type: secondary
          authMode: api-key
      - id: fable
        runtime: claude-code
        model: claude-fable-5
        provider: anthropic-plan
        params:
          type: runtime-target
          authMode: subscription
      - id: opus
        runtime: claude-code
        model: claude-opus-4.8
        provider: anthropic-plan
        params:
          type: runtime-target
          authMode: subscription
