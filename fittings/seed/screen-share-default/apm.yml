name: screen-share-default
version: 0.2.0
description: macOS screenshot capture — ~1fps JPEG polling viewer for phone/remote access. Stand-alone Fitting with own React UI on its own port.
target: claude
type: hybrid
includes: auto
x-garrison:
  faculty: screen-share
  cardinality_hint: single
  component_shape: plugin
  platforms:
    - claude-code
  summary: Stand-alone UI server (default port 7079) that runs screencapture -x in a polling loop and exposes the latest JPEG frame. Requires Screen Recording permission for the process that starts it.
  config_schema:
    - key: port
      type: integer
      default: 7079
      description: HTTP port the screen-share server binds to. Falls back to next free port when in use.
    - key: bind_host
      type: string
      default: 127.0.0.1
      description: Bind address; 0.0.0.0 to expose over Tailscale.
    - key: capture_interval_ms
      type: integer
      default: 1000
      description: How often the capture loop runs screencapture.
  provides:
    - kind: screen-share
      name: screen-share-default
  consumes: []
  setup:
    command: node ui/build.mjs
    idempotent: true
    timeout_ms: 60000
  verify:
    command: node apm_modules/_local/screen-share-default/scripts/probe.mjs --probe
    expect: ok
    timeout_ms: 10000
  for_consumers: |
    Consumers discover this UI at runtime by reading:
      ~/.garrison/ui-fittings/screen-share-default.json
    Carries: { fittingId, port, url, pid, startedAt }.
    Endpoints:
      GET    /health              - {ok: true, port, pid}
      GET    /state               - {running, permissionGranted, lastError, lastCaptureAt}
      POST   /start               - begin capture loop
      POST   /stop                - stop capture loop
      GET    /frame               - latest JPEG bytes (Content-Type: image/jpeg) or 404
    macOS only (uses `screencapture -x`). Screen Recording permission needed for the launching process.
