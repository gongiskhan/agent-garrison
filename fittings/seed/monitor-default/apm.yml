name: monitor-default
version: 0.1.0
description: Default Monitor Fitting for Agent Garrison — read-only visibility into every entity Garrison spawns.
target: claude
type: hybrid
includes: auto
x-garrison:
  faculty: observability
  cardinality_hint: single
  own_port: true
  component_shape: plugin
  platforms:
    - claude-code
  summary: Walks the Garrison process tree, captures stdout/stderr from spawn-helper-wrapped children, and serves a React UI on its own port (default 7077). Also shows a system-vitals panel (CPU load, memory, per-mount disk usage, network throughput, and the state of garrison-* systemd user units on Linux). Strictly read-only and display-only; never kills, signals, pauses, starts, or restarts processes or units.
  config_schema:
    - key: port
      type: integer
      default: 7077
      description: HTTP port the Monitor server binds to. Falls back to next free port when in use.
    - key: bind_host
      type: string
      default: 127.0.0.1
      description: Bind address; 0.0.0.0 to expose over Tailscale.
    - key: poll_interval_ms
      type: integer
      default: 1000
      description: How often the entity walker rescans the process tree.
    - key: log_retention_hours
      type: integer
      default: 24
      description: Hours after a PID is observed dead before its ~/.garrison/logs/<pid>/ directory is cleaned up.
  provides:
    - kind: monitor
      name: monitor
  consumes: []
  setup:
    command: node ui/build.mjs
    idempotent: true
    timeout_ms: 60000
  verify:
    command: node apm_modules/_local/monitor-default/scripts/probe.mjs --probe
    expect: ok
    timeout_ms: 10000
  for_consumers: |
    Consumer Fittings (web-channel, http-gateway chat UI, the /tools discovery page)
    discover the Monitor at runtime by reading:
      ~/.garrison/ui-fittings/monitor-default.json
    The file (written when the server binds) carries:
      { fittingId, port, url, pid, startedAt }
    Then `GET <url>/health` to confirm reachability before linking.
    Endpoints:
      GET  /health                            → {ok: true, port, pid}
      GET  /api/entities                      → list of all Garrison-spawned entities
      GET  /api/entities/:pid                 → single entity detail (with redacted env)
      GET  /api/entities/:pid/logs?stream=…   → captured stdout/stderr (paged + SSE tail)
      GET  /api/entities/stream               → SSE snapshot tick (default 1 Hz); each
                                                snapshot also carries a `vitals` field
      GET  /api/vitals                        → latest system-vitals sample:
                                                { ts, cpu, mem, disks[], net, units[] }
                                                (refreshed every ~5s). Disk severity is
                                                classified ok / warn (≥85%) / critical (≥95%).
    No mutation endpoints; observation only. The vitals panel is display-only — it never
    exposes kill / restart / start / stop controls for processes or systemd units.
