name: garrison-tier-classifier
version: 0.1.0
description: Tier classifier seed for Agent Garrison.
target: claude
type: skill
includes: auto
x-garrison:
  faculty: classifier
  cardinality_hint: single
  component_shape: skill
  platforms:
    - claude-code
  summary: Tier 1-7 routing floor; T3+ forces plan-then-reclassify-then-route.
  config_schema:
    - key: tier_floor
      type: integer
      default: 3
      description: Minimum tier this classifier raises every prompt to.
    - key: plan_threshold
      type: integer
      default: 3
      description: Tier at which the operative must plan before execution.
  provides:
    - kind: agent-skill
      name: tier-classifier
  setup:
    command: bash scripts/setup.sh
    idempotent: true
  verify:
    command: node apm_modules/_local/tier-classifier/scripts/classify_tier.mjs --probe
    expect: ok
    timeout_ms: 10000
  for_consumers: |
    Invoke via the `classify_tier` MCP tool exposed by `mcp-gateway`.
    Input: { prompt: string }
    Output: { tier: integer (1-7), reason: string }
    tier_floor (default 3) is the minimum returned tier. plan_threshold (default 3)
    is documented for the model; enforcement is the Operative's responsibility.
    Backed by @anthropic-ai/claude-agent-sdk; uses user's Max auth — no API key needed.
  ui:
    views:
      - id: main
        placement: faculty-tab
        entry: ./ui/ClassifierInspector.tsx
        route: /
