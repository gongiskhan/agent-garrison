name: worktree-management-sequoias
version: 0.1.0
description: Git worktree lifecycle manager — create, list, and delete worktrees with per-branch isolation. Derived from Sequoias.
target: claude
type: plugin
includes: auto
x-garrison:
  faculty: worktree-management
  cardinality_hint: single
  component_shape: plugin
  platforms:
    - claude-code
  summary: Sequoias-derived worktree manager. Create and manage isolated git worktrees for parallel branch work.
  for_consumers: |
    Use worktrees when you need to work on a different branch without disturbing the current checkout.
    Worktrees are created at ~/.worktrees/<repo-name>/<branch-slug>.
    Use the Workbench tab to list, create, and remove worktrees interactively.
    API: GET /api/workbench/worktrees?repoPath=<path> to list.
    API: POST /api/workbench/worktrees { repoPath, branch, baseBranch } to create.
    API: DELETE /api/workbench/worktrees { repoPath, worktreePath } to remove.
  config_schema:
    - key: repo_path
      type: path
      description: Absolute path (or ~/...) to the git repository to manage worktrees for.
      required: true
  provides:
    - kind: worktree
      name: worktree-management-sequoias
  setup:
    command: bash scripts/setup.sh
    idempotent: true
    timeout_ms: 10000
  verify:
    command: bash scripts/verify.sh
    expect: ok
    timeout_ms: 5000
  ui:
    views:
      - id: main
        placement: faculty-tab
        entry: ./ui/WorktreeView.tsx
        route: /
