name: worktree-management-sequoias
version: 0.2.0
description: Git worktree lifecycle Fitting. Stand-alone UI server on port 7080; backs ~/.garrison/sessions/state.json so the session-view Fitting sees new worktrees automatically.
target: claude
type: hybrid
includes: auto
x-garrison:
  faculty: worktree-management
  cardinality_hint: single
  component_shape: plugin
  platforms:
    - claude-code
  summary: Create, list, and remove isolated git worktrees at ~/.worktrees/<repo>/<branch-slug>. Writes session records into ~/.garrison/sessions/state.json — picked up by session-view automatically.
  config_schema:
    - key: port
      type: integer
      default: 7080
      description: HTTP port the worktree-management UI binds to. Falls back to next free port.
    - key: bind_host
      type: string
      default: 127.0.0.1
      description: Bind address; 0.0.0.0 to expose over Tailscale.
    - key: repo_path
      type: string
      default: ""
      description: Default repository path (absolute). When set, the UI pre-selects this project.
    - key: ide_path
      type: string
      default: /Applications/Rebased.app
      description: |
        IDE to spawn from each row's "Open in IDE" button. Accepts a
        macOS .app bundle (opened via `open -a`) or a raw launcher
        binary (executed with the worktree path as argv[1]). Default
        points to the Rebased fork (IntelliJ-platform git client).
        Runtime override via env GARRISON_IDE_PATH.
  provides:
    - kind: worktree
      name: worktree-management-sequoias
  consumes:
    - kind: outpost
      cardinality: any
  setup:
    command: node ui/build.mjs
    idempotent: true
    timeout_ms: 60000
  verify:
    command: node apm_modules/_local/worktree-management-sequoias/scripts/probe.mjs --probe
    expect: ok
    timeout_ms: 10000
  for_consumers: |
    Consumers discover this UI at runtime by reading:
      ~/.garrison/ui-fittings/worktree-management-sequoias.json
    Endpoints:
      GET    /health                              - liveness
      GET    /worktrees?repoPath=<path>           - list worktrees (git + state.json)
      POST   /worktrees {repoPath, branch, ...}   - create new worktree
      DELETE /worktrees/:id                       - remove worktree
    Worktrees live at ~/.worktrees/<repo-name>/<branch-slug>.
    Mutates ~/.garrison/sessions/state.json — session-view picks up new entries on its next poll.
