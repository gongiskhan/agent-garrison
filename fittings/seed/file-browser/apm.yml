name: file-browser
version: 0.1.0
description: Mobile-first File Browser — browse, view, and edit files in a scoped workspace.
target: claude
type: hybrid
includes: auto
x-garrison:
  faculty: sessions
  cardinality_hint: single
  component_shape: plugin
  own_port: true
  default_port: 27091
  lifecycle: operative-bound
  platforms:
    - claude-code
  summary: A mobile-first File Browser that browses, views, and edits files under a SCOPED workspace root (default ~/.garrison/files). Syntax-highlit code via Monaco, rendered Markdown via marked, inline images — the artifact surface that replaces the artifact-store. Path-traversal-confined to its root; refuses to serve credential files.
  config_schema:
    - key: root
      type: string
      default: ~/.garrison/files
      description: The workspace root the browser is confined to. Never escapes this dir (path-traversal-safe).
    - key: port
      type: integer
      default: 27091
      description: HTTP port; the server exits non-zero when it is taken (no auto-shift).
  provides: []
  consumes: []
  ui:
    views:
      - id: file-browser
        placement: faculty-tab
        entry: ./dist/index.html
        route: /
  setup:
    command: bash scripts/setup.sh
    idempotent: true
    timeout_ms: 15000
  verify:
    command: node apm_modules/_local/file-browser/scripts/server.mjs --probe
    expect: ok
    timeout_ms: 10000
  for_consumers: |
    The Files view is the artifact surface. To hand the user a file, write it
    with a plain filesystem write (mkdir -p the folder, write the file - no
    API involved) under `~/.garrison/files/<namespace>/` (or
    `$GARRISON_FILEBROWSER_ROOT` when set). Namespaces:

    - `documents/` - user-facing markdown, reports, specs
    - `recordings/` - audio, video, screen captures
    - `runs/` - run outputs, logs, evidence from automated work
    - `uploads/` - files the user supplied

    Prefix filenames with the ISO date (`2026-07-10-feature-spec.md`) so
    listings sort chronologically. The user views everything in the Files view
    (sidebar Views) on phone or desktop: markdown renders, images display
    inline, text files are editable.
