name: terminal-armory-default
version: 0.2.0
description: PTY-backed terminal sessions. Stand-alone Fitting with own xterm.js UI on port 7078; WebSocket bridge to node-pty.
target: claude
type: hybrid
includes: auto
x-garrison:
  faculty: terminal
  cardinality_hint: single
  component_shape: plugin
  platforms:
    - claude-code
  summary: Multi-session terminal panel (default port 7078). Local PTY via node-pty, xterm.js UI, WebSocket bridge on /io.
  config_schema:
    - key: port
      type: integer
      default: 7078
      description: HTTP port the terminal UI binds to. Falls back to next free port.
    - key: bind_host
      type: string
      default: 127.0.0.1
      description: Bind address; 0.0.0.0 to expose over Tailscale.
    - key: default_shell
      type: string
      default: ""
      description: Shell to spawn for new sessions. Empty = $SHELL or /bin/zsh.
    - key: ide_path
      type: string
      default: /Applications/Rebased.app
      description: |
        IDE to spawn from the "Open in IDE" button. Accepts either a
        macOS .app bundle (opened via `open -a`) or a raw launcher
        binary (executed with the project path as argv[1]). Default
        points to the Rebased fork (IntelliJ-platform git client).
        Runtime override via env GARRISON_IDE_PATH.
  provides:
    - kind: terminal-session
      name: terminal-armory-default
  consumes:
    - kind: outpost
      cardinality: any
  setup:
    command: node ui/build.mjs
    idempotent: true
    timeout_ms: 60000
  verify:
    command: node apm_modules/_local/terminal-armory-default/scripts/probe.mjs --probe
    expect: ok
    timeout_ms: 10000
  for_consumers: |
    Consumers discover this UI at runtime by reading:
      ~/.garrison/ui-fittings/terminal-armory-default.json
    Carries: { fittingId, port, url, pid, startedAt }.

    HTTP endpoints:
      GET    /health                                 - liveness
      GET    /sessions                               - list active PTY sessions
      POST   /terminals {name?, cwd?, shell?, command?} - create new PTY session
      DELETE /terminals/:id                          - kill session

    Session summary shape (`GET /sessions`):
      { id, name, cwd, shell, command, busy, createdAt }
    `command` is the initial line written into the PTY at spawn (null if
    none). Use it to detect tabs that are running `claude ...`, an editor,
    or other long-lived processes.

    UI bootstrap query params (open <url>/?<params>):
      ?focus=<sessionId>             switch the open browser tab to the
                                     named PTY session (no new session is
                                     created); pair with window.open(...,
                                     "garrison-terminal") to reuse the tab.
      ?cwd=&command=&name=           create a new PTY session at cwd,
                                     write `command` after 250ms, label
                                     the tab `name`.

    Find-or-focus pattern (recommended for cross-fitting links):
      1. Fetch `GET /sessions`.
      2. Match a row by (cwd, name, command startsWith ...).
      3. If found, `window.open(<url>/?focus=<id>, "garrison-terminal")`.
      4. Otherwise, `window.open(<url>/?cwd=...&command=...&name=...,
         "garrison-terminal")` to spawn.

    WebSocket protocol on /io:
      client -> server JSON {type:"init", sessionId}
      server -> client JSON {type:"init_ack"} or {type:"error", message}
      client -> server binary: stdin bytes
      server -> client binary: stdout bytes
      client -> server JSON {type:"resize", cols, rows}
