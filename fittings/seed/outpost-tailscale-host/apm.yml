name: outpost-tailscale-host
version: 0.3.0
description: Garrison Outpost — remote Mac bridge + Claude config sync. Stand-alone Fitting with own React UI on its own port (default 27082); proxies to the outpost-host daemon on 127.0.0.1:23702 and mirrors this host's portable ~/.claude config onto every configured outpost over rsync-over-SSH.
target: claude
type: hybrid
includes: auto
x-garrison:
  faculty: surfaces
  cardinality_hint: multi
  own_port: true
  default_port: 27082
  component_shape: plugin
  platforms:
    - claude-code
  summary: Outpost bridge for Tailscale-connected remote Macs. UI server on port 27082 lists registered outposts, surfaces connection status, and forwards RPC calls to the outpost-host daemon.
  config_schema:
    - key: port
      type: integer
      default: 27082
      description: HTTP port the outpost UI server binds to. Bound exactly; the server exits 1 on EADDRINUSE rather than shifting ports.
    - key: bind_host
      type: string
      default: 127.0.0.1
      description: Bind address; 0.0.0.0 to expose over Tailscale.
    - key: outpost_host_url
      type: string
      default: http://127.0.0.1:23702
      description: URL of the outpost-host daemon to proxy registry calls to.
  provides:
    - kind: outpost
      name: outpost-tailscale-host
  setup:
    command: node ui/build.mjs
    idempotent: true
    timeout_ms: 60000
  verify:
    command: node apm_modules/_local/outpost-tailscale-host/scripts/probe.mjs --probe
    expect: ok
    timeout_ms: 10000
  for_consumers: |
    Consumers discover this UI at runtime by reading:
      ~/.garrison/ui-fittings/outpost-tailscale-host.json
    Carries: { fittingId, port, url, pid, startedAt }.
    Endpoints (proxied to outpost-host daemon at config.outpost_host_url unless noted):
      GET    /health                        - {ok: true, port, pid}
      GET    /outposts                      - list registered outposts + status
      POST   /outposts {name, token}        - register a new outpost (manual token)
      POST   /registry/pair {name}          - mint a token; returns {token, host, installer}
      DELETE /outposts/:name                - unregister
      POST   /outposts/:name/rpc            - issue blocking RPC call
      GET    /outposts/:name/log?limit=20   - last N invocation-log entries
      GET    /checkouts                     - FILES-FIT-V2 checkout registry (feature-detected; {} when absent)
      POST   /provision {host, user}        - LOCAL: SSH-provision a Mac (installs bridge, mirrors config, registers a sync target); returns {jobId}
      GET    /provision/:jobId/stream       - LOCAL: SSE stream of the provision job output
    Config sync (LOCAL rsync-over-SSH; state-changing routes are CSRF/rebind guarded):
      GET    /sync/targets                  - { claudeDir, portable:{dirs,files}, targets }
      POST   /sync/targets {sshUser,sshHost,name?} - register/replace a config-sync target
      DELETE /sync/targets/:name            - stop syncing to a target
      POST   /sync                          - mirror the portable ~/.claude subset to ALL targets now
      POST   /outposts/:name/sync           - mirror to one target now
    Config sync mirrors the PORTABLE subset only (skills, commands, agents, rules,
    output-styles, CLAUDE.md) with rsync --delete, so host removals propagate.
    settings.json / plugins / mcp.json / sessions are machine-specific and NOT synced.
    A file watcher pushes on change and a periodic healer (GARRISON_OUTPOST_SYNC_HEAL_MS,
    default 10m) re-pushes so outposts that were offline during a change catch up - so
    this Fitting should be eager-toggled if you want config reflected "always".
    Sync targets are persisted at ~/.garrison/outpost-sync-targets.json.
    The outpost-host daemon must be installed and running for the RPC/registry routes.
    Each remote Mac runs the garrison-outpost-bridge daemon over Tailscale.
