name: slack-channel
version: 0.1.0
description: Slack Events API channel for Agent Garrison.
target: claude
type: hybrid
includes: auto
x-garrison:
  faculty: channels
  cardinality_hint: multi
  component_shape: script
  platforms:
    - claude-code
  summary: Receives Slack app_mention/im events and round-trips replies through the gateway's /chat.
  config_schema:
    - key: slack_port
      type: integer
      default: 29512
      description: Local port the Slack webhook receiver binds to.
    - key: gateway_url
      type: string
      default: http://127.0.0.1:24777
      description: Garrison HTTP gateway base URL.
    - key: chat_timeout_ms
      type: integer
      default: 600000
      description: Max time to wait for the gateway's /chat reply before posting a fallback message.
  connector:
    auth: api_key
    actions:
      - name: send_message
        args:
          - channel
          - text
        mutates: true
        description: Post a message to a channel.
      - name: list_channels
        args:
          - limit
        mutates: false
        description: List conversations the bot can see.
    triggers:
      - type: webhook
        event: app_mention
        description: Inbound app_mention events routed through the Gateway.
  secret_scope:
    - SLACK_BOT_TOKEN
  provides:
    - kind: channel
      name: slack
    - kind: connector
      name: slack
  consumes:
    - kind: vault
      cardinality: one
  setup:
    command: bash scripts/setup.sh
    idempotent: true
    timeout_ms: 15000
  verify:
    command: test -f apm_modules/_local/slack-channel/scripts/slack-adapter.js && echo ok
    expect: ok
    timeout_ms: 10000
