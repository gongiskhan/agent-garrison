name: soul-architect
version: 0.1.0
description: Architect Soul for Agent Garrison — design and systems thinking specialist sub-session.
target: claude
type: prompts
includes: auto
x-garrison:
  faculty: skills
  cardinality_hint: multi
  component_shape: system-prompt
  platforms:
    - claude-code
  summary: Design thinking specialist Soul. Read access to source code; produces markdown design documents.
  config_schema:
    - key: base_path
      type: path
      default: "~/code"
      description: "Base directory for project work. The Orchestrator picks a subdirectory within this path for each task."
  provides:
    - kind: agent-skill
      name: soul.architect
  consumes:
    - kind: mcp-gateway
      cardinality: optional-one
  spawn:
    preset: none
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Write
      - Edit
      - WebSearch
      - WebFetch
    disallowed_tools:
      - Bash
    exclude_dynamic_sections: false
    base_path: "~/code"
  verify:
    command: test -f apm_modules/_local/soul-architect/.apm/prompts/soul-architect.prompt.md && echo ok
    expect: ok
    timeout_ms: 10000
  for_consumers: |
    Architect Soul — spawned by the Orchestrator for design discussions and systems thinking.
    Uses preset:none (full system prompt replacement). Has read access + web search;
    no Bash. Produces markdown design documents. base_path defaults to ~/code.
