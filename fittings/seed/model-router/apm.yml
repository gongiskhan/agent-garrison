name: model-router
version: 0.1.0
description: Model Router (Orchestrator Faculty) for Agent Garrison — a visible routing policy that resolves each prompt to a role + discipline + continuation, then maps the role to a concrete runtime-target via the active Profile.
target: claude
type: hybrid
includes: auto
x-garrison:
  faculty: orchestrator
  cardinality_hint: single
  own_port: true
  component_shape: system-prompt
  platforms:
    - claude-code
  summary: >-
    Fills the Orchestrator Faculty. Owns routing.json (Exceptions → Matrix →
    Continuations resolving to a fixed role vocabulary, shared across Profiles;
    each Profile is a role→target map + discipline overrides). Compiles a
    byte-stable routing.md injected into the assembled prompt via {{routing}},
    and serves an own-port view (default 7087) with Policy / Simulator /
    Compiled / Telemetry panes that own GET/PUT /routing.
  config_schema:
    - key: port
      type: integer
      default: 7087
      description: HTTP port the Model Router view + config API binds to. Falls back to next free port when in use.
    - key: bind_host
      type: string
      default: 127.0.0.1
      description: Bind address; 0.0.0.0 to expose over Tailscale.
    - key: routing_config
      type: path
      default: routing.json
      description: Composition-scoped routing config path (whole-document, baseline-hash guarded on PUT).
  provides:
    - kind: orchestrator
      name: model-router
  consumes: []
  setup:
    command: node ui/build.mjs && node scripts/compile.mjs --check
    idempotent: true
    timeout_ms: 90000
  verify:
    command: node apm_modules/_local/model-router/scripts/probe.mjs --probe
    expect: ok
    timeout_ms: 15000
  for_consumers: |
    The Model Router fills the Orchestrator Faculty. Its compiled routing.md
    section is injected into the assembled system prompt via the {{routing}}
    placeholder — it tells the operative which role/target the gateway resolved,
    the discipline duties for the tier, the continuation rules, and the reply
    token duty. The operative does NOT choose its own model: the gateway
    pre-routes (Stage A) before the turn and places it on the resolved target.
    Every reply must end with `[route: <target-id> | rule: <rule-id> | profile: <name>]`.
    Config API (own-port server, default 7087):
      GET  /routing   → {config, baselineSha}
      PUT  /routing   → whole-document write, 409 on baselineSha mismatch
