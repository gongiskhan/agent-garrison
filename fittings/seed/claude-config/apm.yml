name: claude-config
version: 0.1.0
description: Garrison-managed ~/.claude config surfaces — commands, agents, hooks, templates, mcp.json, settings fragments — imported from the decommissioned claude-share repo.
target: claude
type: script
includes: auto
x-garrison:
  faculty: building
  cardinality_hint: single
  component_shape: script
  platforms:
    - claude-code
  summary: >-
    The config home (GARRISON-UNIFY-V1 S8, D23). Holds the ~/.claude content that
    is not a Faculty-owned fitting: shared slash commands, subagents, hooks,
    templates, mcp.json, and the settings fragments (including the autothing
    goal-loop hooks). agent-garrison is now the single config home; claude-share
    is decommissioned (D24). The `garrison config` CLI (status | pull | commit)
    syncs the live ~/.claude against this payload and commits drift back into
    agent-garrison.
  config_schema:
    - key: payload_dir
      type: path
      default: payload
      description: Fitting-relative directory whose tree mirrors ~/.claude (commands/, agents/, hooks/, templates/, mcp.json, settings-fragments/).
  provides: []
  consumes: []
  verify:
    command: test -d apm_modules/_local/claude-config/payload && echo ok
    expect: ok
    timeout_ms: 10000
  for_consumers: |
    This fitting is the source-of-record for the shared ~/.claude config surfaces.
    Use `garrison config status` to see drift between ~/.claude and this payload,
    `garrison config pull` to write the payload into ~/.claude, and
    `garrison config commit` to copy ~/.claude drift back into this payload and
    push agent-garrison. A breadcrumb README in ~/.claude names the command.
