name: coord-beads
version: 0.1.0
description: >-
  Beads (bd) coordination Fitting — a git-backed, per-repo shared decision/intent/task
  graph that parallel Claude Code sessions read and write to avoid drift. Installs the
  pinned `bd` CLI and a user-scope, owner-tagged SessionStart hook that primes every
  session (direct or orchestrator) with the repo's beads workflow context.
target: claude
type: hybrid
includes: auto
x-garrison:
  faculty: memory
  cardinality_hint: single
  component_shape: hook
  platforms:
    - claude-code
  summary: >-
    Per-repo git-backed decision graph (Beads v1.0.5, pure MIT). Installs `bd` and an
    owner-tagged user-scope SessionStart hook (`bd prime`) so every `claude` invocation
    — a direct run in any repo AND the orchestrator session — inherits the repo's
    coordination context. In a repo with no beads graph the hook returns empty context
    and never errors or blocks. Selecting installs at user scope; deselecting removes the
    owner-tagged hook cleanly and completely.
  for_consumers: |
    Beads is the per-repo decision/intent/task store the coordination layer reads.
    It is per-repo: each project's `.beads/` graph stays its own — never mixed across
    repos. The `coord-mcp` planning gate backs its per-repo lock on a Beads record.

    CLI (user-scope, on PATH after install):
      bd ready                 # issues ready to work (no blockers)
      bd create --title=… --type=task|bug|feature --priority=2
      bd update <id> --claim   # claim work
      bd close <id>            # complete
      bd remember "<insight>"  # persistent cross-session knowledge
      bd prime                 # full workflow context (the SessionStart hook calls this)

    A repo only participates once `bd init` has created its `.beads/` graph. Until then
    `bd prime` is a quiet no-op (empty context, exit 0) — no behavior change in a fresh
    repo. The coordination layer (coord-mcp `begin_planning`) lazily `bd init`s a repo
    the first time it is explicitly opted into planning, so passive session-open never
    litters `.beads/` into unrelated repos.
  config_schema:
    - key: bd_version
      type: string
      default: 1.0.5
      description: Pinned Beads version (github.com/gastownhall/beads, pure MIT). Recorded for reproducibility; setup verifies the installed bd is at least this.
  provides:
    - kind: memory-store
      name: beads
  consumes: []
  setup:
    command: bash scripts/setup.sh
    idempotent: true
    timeout_ms: 300000
  verify:
    command: bash apm_modules/_local/coord-beads/scripts/verify.sh
    expect: ok
    timeout_ms: 20000
