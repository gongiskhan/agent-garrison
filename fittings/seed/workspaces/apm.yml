name: workspaces
version: 0.1.0
description: Tiling pane workspace for Agent Garrison — composes other Fittings' views side by side.
target: claude
type: skill
includes: auto
x-garrison:
  faculty: sessions
  cardinality_hint: single
  component_shape: cli-skill
  platforms:
    - claude-code
  summary: Tiling pane container that references other Fittings' views. Arrange embedded views and own-port surfaces side by side; the layout persists continuously, panes never fork or own the instances they show.
  for_consumers: |
    Workspaces is a UI-only Fitting; it exposes no CLI and no runtime
    capability for the Operative to call. It references views other Fittings
    produce (by fitting:view#instance) and tiles them in one surface for the
    user. Nothing to invoke — if the user mentions their workspace layout,
    it lives at ~/.garrison/view-state/workspaces/.
  config_schema: []
  provides: []
  consumes:
    - kind: view
      cardinality: any
  verify:
    command: bash apm_modules/_local/workspaces/scripts/verify.sh
    expect: ok
    timeout_ms: 10000
  ui:
    views:
      - id: main
        placement: sidebar-surface
        entry: ./ui/WorkspaceView.tsx
        route: /
        # The tiling container owns the whole estate — the surface page
        # suppresses the fitting-overview header and width cap.
        chrome: full-bleed
