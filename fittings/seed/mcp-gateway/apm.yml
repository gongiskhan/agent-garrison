name: garrison-mcp-gateway
version: 0.2.0
description: MCP gateway Fitting for Agent Garrison interactive (UI-tab-launched) sessions.
target: claude
type: hybrid
includes: auto
x-garrison:
  faculty: gateway
  cardinality_hint: multi
  component_shape: script
  platforms:
    - claude-code
  summary: Exposes installed Faculties as MCP tools to interactive (UI-tab-launched) Claude Code sessions. Hosts the garrison-control tool set (talk_to, wait_for, …) when GARRISON_HTTP_GATEWAY_BASE_URL is set.
  config_schema:
    - key: bind_host
      type: string
      default: "0.0.0.0"
      description: HTTP transport bind host (must be Tailscale-reachable for remote outposts).
  provides:
    - kind: mcp-gateway
      name: mcp-gateway
  consumes:
    - kind: orchestrator
      cardinality: optional-one
  setup:
    command: bash scripts/setup.sh
    idempotent: true
    timeout_ms: 120000
  verify:
    command: node apm_modules/_local/mcp-gateway/scripts/gateway.mjs --probe
    expect: ok
    timeout_ms: 8000
  for_consumers: |
    Orchestrator/soul-mode sidecar - not invoked directly by the Operative.
    The http-gateway spawns it per soul session as a stdio MCP child (no port of
    its own); remote outpost sessions connect over HTTP MCP instead. Hosts the
    garrison-control tool set (present when GARRISON_HTTP_GATEWAY_BASE_URL is
    set): talk_to, wait_for, list_active_sessions, end_session, list_workdirs,
    list_worktrees, create_worktree, get_worktree, close_worktree.
