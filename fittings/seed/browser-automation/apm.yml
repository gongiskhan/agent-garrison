name: browser-automation
version: 0.1.0
description: Browser automation seed for Agent Garrison.
target: claude
type: skill
includes: auto
x-garrison:
  faculty: automations
  cardinality_hint: multi
  component_shape: cli-skill
  platforms:
    - claude-code
  summary: Playwright CLI plus a driving skill for browser automation.
  config_schema:
    - key: browser
      type: select
      default: chromium
      description: Browser engine to drive.
      options:
        - chromium
        - firefox
        - webkit
    - key: headless
      type: boolean
      default: false
      description: Whether browser runs headless.
  consumes:
    - kind: vault
      cardinality: optional-one
  verify:
    command: test -f .claude/skills/browser-automation/SKILL.md && echo ok
    expect: ok
    timeout_ms: 10000
