name: session-view-sequoias
version: 0.2.0
description: Per-worktree Claude Code session status view — read-only aggregator of ~/.garrison/sessions/state.json with its own React UI on its own port.
target: claude
type: hybrid
includes: auto
x-garrison:
  faculty: sessions
  cardinality_hint: single
  own_port: true
  default_port: 7081
  component_shape: plugin
  platforms:
    - claude-code
  summary: Stand-alone UI server (default port 7081) that aggregates Garrison session state. Read-only; lists branch / project / status / since for each active worktree session.
  config_schema:
    - key: port
      type: integer
      default: 7081
      description: HTTP port the session-view server binds to. Falls back to next free port when in use.
    - key: bind_host
      type: string
      default: 127.0.0.1
      description: Bind address; 0.0.0.0 to expose over Tailscale.
    - key: poll_interval_ms
      type: integer
      default: 3000
      description: How often the UI re-reads state.json.
  provides:
    - kind: session-view
      name: session-view-sequoias
  consumes:
    - kind: worktree
      cardinality: optional-one
    - kind: terminal-session
      cardinality: optional-one
    - kind: outpost
      cardinality: any
  setup:
    command: node ui/build.mjs && node scripts/install-hooks.mjs
    idempotent: true
    timeout_ms: 60000
  verify:
    command: node apm_modules/_local/session-view-sequoias/scripts/probe.mjs --probe
    expect: ok
    timeout_ms: 10000
  for_consumers: |
    Consumers discover the session-view UI at runtime by reading:
      ~/.garrison/ui-fittings/session-view-sequoias.json
    Carries: { fittingId, port, url, pid, startedAt }.
    Then `GET <url>/health` to confirm reachability before linking.
    Endpoints:
      GET  /health             - {ok: true, port, pid}
      GET  /sessions           - {sessions: AggregatedSession[], outposts: []}
      POST /_hook?event=<name> - Claude Code hook payload (session_id,
                                 transcript_path, hook_event_name, cwd, ...)
                                 forwarded verbatim from stdin. `event` lives
                                 on the query string. Tracked events:
                                 UserPromptSubmit | PostToolUse | Stop |
                                 Notification.
      POST /sessions/cleanup   - removes sessions whose worktreePath is gone
      GET  /terminal-target    - returns the terminal fitting's live URL (for new-tab launches)
    AggregatedSession shape:
      { branch, worktreePath, lastStatus, lastStatusAt, projectName,
        projectPath, machine, online, id, claudeSessionId, ... }
    `claudeSessionId` is the Claude Code session id (captured from hook
    payloads). When present, consumers can launch `claude --resume
    <claudeSessionId>` to deterministically pick up that session; when
    absent, fall back to `claude --continue` from `worktreePath`.
    Statuses are: starting, working, waiting, idle, errored, dead, stale.
    Reads ~/.garrison/sessions/state.json directly; writes back via hook events.
    Setup installs `_garrison`-tagged matcher groups into ~/.claude/settings.json
    so Claude Code hooks POST status transitions to /_hook. Re-running setup
    is idempotent. To remove hooks: `node scripts/uninstall-hooks.mjs`.
