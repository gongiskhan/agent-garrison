name: session-view-sequoias
version: 0.2.0
description: Claude Code session status dashboard across git worktrees — local and remote outpost machines.
target: claude
type: hybrid
includes: auto
x-garrison:
  faculty: session-view
  cardinality_hint: single
  component_shape: plugin
  platforms:
    - claude-code
  summary: Per-worktree session status view — idle/working/waiting/errored badges aggregated from local and outpost machines.
  for_consumers: |
    Use GET /api/workbench/sessions to read current Claude Code session statuses across worktrees.
    Statuses are: working, waiting, idle, errored, dead.
    Response shape: { sessions: AggregatedSession[], outposts: [{ name, online, lastSyncedAt }] }.
    Each session has a `machine` field ("local" or outpost name) and `online` boolean.
    Data is sourced from ~/.garrison/sessions/state.json (local) and the equivalent file on each
    connected outpost via fs.read RPC.
  provides:
    - kind: session-view
      name: session-view-sequoias
  consumes:
    - kind: worktree
      cardinality: optional-one
    - kind: terminal-session
      cardinality: optional-one
    - kind: outpost
      cardinality: any
  setup:
    command: bash scripts/setup.sh
    idempotent: true
    timeout_ms: 5000
  verify:
    command: bash apm_modules/_local/session-view-sequoias/scripts/verify.sh
    expect: ok
    timeout_ms: 5000
  ui:
    views:
      - id: main
        placement: faculty-tab
        entry: ./ui/SessionView.tsx
        route: /
