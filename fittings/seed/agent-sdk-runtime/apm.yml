name: agent-sdk-runtime
version: 0.1.0
description: Agent SDK runtime (Runtime Faculty) — a first-class secondary runtime routable to the Anthropic endpoint (Max subscription) as well as third-party Anthropic-compatible endpoints (Ollama / Z.ai / DeepSeek / MiniMax / LLM proxy). Implements the RuntimeAdapter contract over the Claude Agent SDK with THE HARNESS (per-target promptMode).
target: claude
type: hybrid
includes: auto
x-garrison:
  faculty: runtimes
  cardinality_hint: multi
  component_shape: cli-skill
  platforms:
    - all
  summary: >-
    A secondary Runtime fitting. Implements the RuntimeAdapter contract over the
    Claude Agent SDK (structured request/response, native tool-call handling — no
    PTY, no terminal scraping) and ships a runtime-bridge exposing the uniform
    delegate(task_spec) -> {summary, artifacts} tool. It is first-class routable to
    any provider in the table — the Anthropic endpoint on the Max subscription
    (OAuth, billed to the plan) as well as third-party endpoints reached by base
    URL. THE HARNESS is the one load-bearing property: it wires the full
    claude_code preset + CLAUDE.md + skills for coding roles, or a lean system
    string for chat roles, per the target's promptMode.
  config_schema:
    - key: provider
      type: string
      default: ollama-local
      description: One of anthropic | ollama-local | zai-glm | deepseek | minimax | llm-proxy. `anthropic` uses the Max subscription (OAuth); the rest set a base URL + auth token.
    - key: model
      type: string
      default: ""
      description: Model string for delegated tasks (free-text; e.g. an Ollama tag, a GLM/DeepSeek/MiniMax slot, or any model a proxy fronts).
    - key: promptMode
      type: string
      default: full
      description: full = claude_code preset + settingSources[project] + skills (coding roles); lean = minimal system string, no CLAUDE.md/skills (chat roles, lower token floor).
    - key: maxTurns
      type: number
      default: 12
      description: Cap on the agentic loop — SDK sessions have no default turn limit, so an unbounded loop would run until stopped.
    - key: account
      type: string
      default: ""
      description: RUNTIME-ACCOUNTS-V1 - Anthropic account for this runtime (provider anthropic only). Empty = inherit the launching session's account, else the machine's own login. "auto" = as primary, the Paymaster picks the least-utilized eligible account at spawn (holds when all are over ceiling); as a delegate target it inherits the operative's account (the rotation decision is made once per operative session). Values come from the Garrison account registry; the token (vault ANTHROPIC_ACCOUNT__<name>) is injected at spawn.
  provides:
    - kind: runtime
      name: agent-sdk
  consumes:
    - kind: vault
      cardinality: optional-one
  # D3 (GARRISON-RUNTIMES-V1): the Agent SDK engine takes provider overrides
  # through the same Anthropic-compatible env contract as Claude Code (the SDK
  # reads ANTHROPIC_BASE_URL/AUTH_TOKEN); the model is a per-spawn argument.
  provider_mechanism:
    type: env
    base_url_env: ANTHROPIC_BASE_URL
    auth_env: ANTHROPIC_AUTH_TOKEN
    model_env: GARRISON_MODEL
  setup:
    command: npm install --no-audit --no-fund
    idempotent: true
    timeout_ms: 180000
  verify:
    command: node apm_modules/_local/agent-sdk-runtime/scripts/bridge.mjs --probe
    expect: ok
    timeout_ms: 20000
  for_consumers: |
    Agent-SDK-as-secondary (non-Anthropic models). When the orchestrator resolves
    a task to `secondary:agent-sdk`, the primary calls this fitting's
    runtime-bridge tool:
      delegate(task_spec) -> {summary, artifacts}
    The task spec (JSON: task, paths, constraints, provider, model, promptMode,
    baseUrl, maxTurns, budgetTokens, expectedSchema) is passed via STDIN (never
    argv). The provider selects the endpoint — `anthropic` (Max subscription,
    OAuth) or a third-party base-URL provider. Each provider carries a capability
    record; an MCP-dependent or vision task is refused at a target that cannot
    serve it (e.g. deepseek = text + tool use only). Full output lands in the
    Artifact Store; the return is a schema-validated summary + artifact paths;
    every delegation is appended to decisions.jsonl.
    CLI:  echo '<task_spec_json>' | node scripts/bridge.mjs delegate
    Probe: node scripts/bridge.mjs --probe   → prints "ok"
