name: scheduler
version: 0.1.0
description: Scheduler seed for Agent Garrison.
target: claude
type: hybrid
includes: auto
x-garrison:
  faculty: observability
  cardinality_hint: single
  component_shape: script
  platforms:
    - all
  summary: Platform-agnostic always-on job scheduler. A plain Node daemon (no Claude Code dependency, no single OS) that ticks cron jobs and supervises listeners independent of the operative — it fires whether or not the operative is up. Reads a machine-global jobs file (~/.garrison/scheduler-jobs.json), persists last_run, exposes a /health endpoint, and is SIGTERM-safe. CLI exposes add/register/enable/disable/remove/list/run-now plus tick (one-shot) and daemon (long-running, --health-port). Fitting setup hooks register jobs via `register` (idempotent; preserves the user's enable/disable choice); any supervisor (systemd / Docker / PM2 / launchd — see launchers/) keeps the daemon alive.
  config_schema:
    - key: jobs_file
      type: path
      default: ~/.garrison/scheduler-jobs.json
      description: Absolute, per-machine path where job definitions are persisted (override via GARRISON_SCHEDULER_JOBS). Machine-global so setup hooks and the daemon agree regardless of cwd.
    - key: log_file
      type: path
      default: ~/.garrison/scheduler.log
      description: Absolute, per-machine path where job execution output is appended (override via GARRISON_SCHEDULER_LOG).
    - key: health_port
      type: integer
      default: 7099
      description: Port the daemon's /health endpoint binds on 127.0.0.1 (override via GARRISON_SCHEDULER_HEALTH_PORT or `daemon --health-port`). A busy port is tolerated; the daemon keeps ticking without /health.
  provides:
    - kind: automation-runner
      name: scheduler
  setup:
    command: bash scripts/setup.sh
    idempotent: true
    timeout_ms: 10000
  verify:
    command: node apm_modules/_local/scheduler/scripts/scheduler.mjs --probe
    expect: ok
    timeout_ms: 10000
