# Dedicated tmux config for the Garrison dev-env Fitting.
# Loaded via `tmux -L garrison -f <this file>` so it never touches the user's
# default tmux server or their personal ~/.tmux.conf. Everything here is tuned
# for "tmux as an invisible persistence layer under a web terminal", NOT for an
# interactive tmux UI.

# No status bar — the pane fills the whole xterm, so the browser terminal looks
# like a plain shell, not "a terminal running tmux".
set -g  status off

# Scrollback authority. Under tmux the outer xterm is driven into the alternate
# screen, so xterm's own scrollback is bypassed; history lives here instead.
set -g  history-limit 50000

# Size the window to the most recently active client (our single attach client),
# and to whatever that client is actually showing.
set -g  window-size latest
set -g  aggressive-resize on

# No Escape-key debounce — claude/vim send raw Esc constantly and any delay
# makes them feel laggy.
set -sg escape-time 0

# TERM inside the panes. xterm-256color is the safest broadly-available entry
# (matches what xterm.js emulates and what every box claude shells out to has).
set -g  default-terminal "xterm-256color"

# UTF-8 locale for every pane. Launchd-started Garrison inherits no LANG/LC_*,
# and without a UTF-8 locale claude renders its glyphs (⏺ ⎿ ⏵ ❯) as ASCII "_"
# (the stray dashes at the start of lines). Export a UTF-8 locale globally so
# new panes pick it up. ptys.mjs also bakes this into the pane's create command
# for sessions started against an already-running server.
set-environment -g LANG en_US.UTF-8
set-environment -g LC_CTYPE en_US.UTF-8

# Wheel scrolls the pane's history. The outer xterm is always in the alternate
# screen under tmux, so this is the ONLY way to scroll back. Dragging the mouse
# to the top/bottom edge of the pane auto-scrolls and extends the selection.
set -g  mouse on

# --- Copy selection straight to the macOS system clipboard ---
# The garrison tmux server runs on the SAME machine as the browser, so piping
# the mouse selection through pbcopy lands it directly on the system pasteboard
# the browser pastes from — no OSC 52 / browser-clipboard-permission dance.
# Without this, tmux copies only to its private paste buffer and the selection
# never reaches the clipboard (the "I select text but paste is empty" bug).
# copy-pipe-and-cancel yanks on mouse-release, so selecting auto-copies the way
# a normal terminal does. (pbcopy is macOS; a Linux host would use xclip/wl-copy.)
set -g  set-clipboard on
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter             send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi y                 send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi DoubleClick1Pane  select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode    DoubleClick1Pane  select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi TripleClick1Pane  select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode    TripleClick1Pane  select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel "pbcopy"
# Double/triple-click from a normal (non-copy-mode) pane is handled by the root
# table — enter copy-mode, select the word/line, and copy to the clipboard.
bind-key -T root DoubleClick1Pane select-pane \; copy-mode -H \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T root TripleClick1Pane select-pane \; copy-mode -H \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel "pbcopy"

# Scroll UX: the wheel enters copy-mode (the only way to see tmux history under
# the alt-screen). Without help, you stay stuck in copy-mode and keystrokes
# don't reach Claude. Make wheel-down at the very bottom auto-exit copy-mode so
# scrolling back to the latest output returns you to normal typing.
bind-key -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 3 scroll-down \; if-shell -F "#{==:#{scroll_position},0}" "send-keys -X cancel"
bind-key -T copy-mode    WheelDownPane select-pane \; send-keys -X -N 3 scroll-down \; if-shell -F "#{==:#{scroll_position},0}" "send-keys -X cancel"
bind-key -T copy-mode-vi WheelUpPane   select-pane \; send-keys -X -N 3 scroll-up
bind-key -T copy-mode    WheelUpPane   select-pane \; send-keys -X -N 3 scroll-up

# Sessions must outlive their attach client — that is the whole point. A
# detached session (dev-env server restarted/killed) keeps its shell+claude
# running until we explicitly kill-session it.
set -g  destroy-unattached off
