name: autothing-skills
version: 0.1.0
description: The autothing family — the disciplined-build orchestrator and its verb skills — as a Garrison skill-shape fitting.
target: claude
type: skill
includes: auto
x-garrison:
  faculty: building
  cardinality_hint: single
  component_shape: skill
  platforms:
    - claude-code
  summary: >-
    Imports the autothing family (the gated-build orchestrator doorway plus every
    phase verb skill: plan, implement, test, adversarial-review, adversarial-test,
    design-audit, walkthrough, validate, codex-checkpoint, report) into
    ~/.claude/skills under APM lockfile ownership (GARRISON-UNIFY-V1 S8, config
    home). The goal-loop hooks (goal-stop / goal-sessionstart / install / probe)
    ship inside the autothing skill dir and are wired into settings.json by the
    installer. Post-import (S5), the doorway reads the compiled Orchestrator
    policy at ~/.garrison/orchestrator/policy.json and the verb skills carry no
    model: frontmatter — the policy is the single routing authority.
  provides: []
  consumes: []
  verify:
    command: test -f apm_modules/_local/autothing-skills/.apm/skills/autothing/SKILL.md && echo ok
    expect: ok
    timeout_ms: 10000
  for_consumers: |
    The autothing family executes autonomous Garrison runs. Each phase verb skill
    is a bindable phase skill (see the Orchestrator fitting's
    PHASE_SKILL_CONTRACT.md): it reads the compiled policy at
    ~/.garrison/orchestrator/policy.json for its model/effort/runtime, does its
    phase's work in the run context it is handed (runDir, card, phase), writes its
    gate-status entry, and prints its gate line. The top-level `autothing` skill is
    the thin doorway: it registers a run as a card in the Kanban board's Plan list
    and drives it through the run engine.
