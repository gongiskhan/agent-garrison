name: modes
version: 0.1.0
description: Three modes (Gary/Joe/James) — one operative, three faces, one shared memory. Souls + shared voice + per-mode routing bias + name-based switching, composed into the orchestrator's system prompt.
target: claude
type: prompts
includes: auto
x-garrison:
  faculty: modes
  cardinality_hint: single
  component_shape: system-prompt
  platforms:
    - claude-code
  summary: The operative's identity layer. Gary (personal assistant), Joe (dev, dispatches code to a native session), James (product/architect, writes briefs). One shared voice, name-based sticky switching, per-mode routing bias. One shared memory.
  config_schema:
    - key: briefs_path
      type: path
      default: ./briefs/
      description: Directory where James (and Gary) save written briefs to disk.
    - key: default_mode
      type: select
      default: gary
      description: The mode a session starts in when no channel default or explicit name applies.
      options:
        - gary
        - joe
        - james
  provides:
    - kind: modes
      name: modes
  consumes: []
  setup:
    command: node scripts/setup.mjs
    idempotent: true
    timeout_ms: 10000
  verify:
    command: node apm_modules/_local/modes/scripts/verify.mjs
    expect: MODES-OK
    timeout_ms: 10000
  for_consumers: |
    This composition has THREE modes: one operative wearing one of three faces, over ONE shared
    memory. Switch by name at the start of a message (sticky, no slash commands):
      - Gary: personal assistant, the base face. Daily life, questions, tasks and calendar. Prose.
        Hands technical work to Joe and product/design thinking to James.
      - Joe: dev. Talks about code in prose, then dispatches the actual implementation to a native
        Claude Code session (the Dev Env) started through the orchestrator (placed at birth with the
        right mode, model and effort), and reports back in the shared voice. Never a wall of diff.
      - James: product and architect. Thinks through features and tradeoffs in prose, then writes a
        brief to disk under briefs_path and hands it to Joe with a one or two sentence summary.
    Shared voice for all three: conversational prose, no bullet lists or headers or tables in
    conversation, no em dashes, never open with flattery. Match length to the question. Memory is
    shared across all three faces.
