name: loop-heartbeat
version: 0.1.0
description: Loop heartbeat seed for Agent Garrison.
target: claude
type: hybrid
includes: auto
x-garrison:
  faculty: observability
  cardinality_hint: single
  component_shape: script
  platforms:
    - claude-code
  summary: Scheduled loop that wakes the operative and dispatches through the gateway.
  config_schema:
    - key: cadence_minutes
      type: integer
      default: 40
      description: Minutes between heartbeat ticks.
    - key: gateway_url
      type: string
      default: http://127.0.0.1:24777/jobs
      description: Gateway endpoint that receives heartbeat jobs.
  provides:
    - kind: automation-runner
      name: loop-heartbeat
  consumes:
    - kind: orchestrator
      cardinality: one
  verify:
    command: node apm_modules/_local/loop-heartbeat/scripts/heartbeat.mjs --probe
    expect: ok
    timeout_ms: 10000
