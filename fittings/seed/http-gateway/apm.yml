name: http-gateway
version: 0.2.0
description: HTTP gateway seed for Agent Garrison.
target: claude
type: hybrid
includes: auto
x-garrison:
  faculty: gateway
  cardinality_hint: multi
  component_shape: script
  platforms:
    - claude-code
  summary: Local HTTP gateway. Single-Operative mode drives an interactive Claude Code TUI via @garrison/claude-pty (node-pty + headless xterm); set GARRISON_GATEWAY_ENGINE=sdk to roll back to the in-process Agent SDK. Orchestrator+souls mode spawns Claude CLI subprocesses with stream-JSON I/O, channels, worktree passthroughs.
  config_schema:
    - key: port
      type: integer
      default: 4777
      description: Local gateway port.
    - key: bind_host
      type: string
      default: 127.0.0.1
      description: Local bind address.
  consumes:
    - kind: orchestrator
      cardinality: one
  verify:
    command: test -f apm_modules/_local/http-gateway/scripts/gateway-pty.mjs && node --input-type=module -e "await import('@garrison/claude-pty')" && command -v claude >/dev/null 2>&1 && echo ok
    expect: ok
    timeout_ms: 15000
  for_consumers: |
    Endpoints (orchestrator+souls mode, set GARRISON_SOULS_CONFIG to enable):
      POST /chat, /chat/stream           — user message → Orchestrator stdin (X-Garrison-Origin: ui-tab|channel header sets prefix)
      POST /jobs                          — heartbeat dispatch → Orchestrator
      POST /sessions/spawn                — spawn a Soul subprocess (headless or interactive mode)
      POST /sessions/:id/wait             — block until result (chunked timeout, default 30s)
      POST /sessions/by-soul/:soul/end    — kill a Soul's active subprocess
      GET  /sessions                      — list active sessions (filters: parent, worktree_id, mode, soul)
      GET  /channels/:id/stream           — SSE multiplex; replays last 100 events on connect, then live
      GET  /workdirs?soul=<name>          — list directories under the Soul's base_path
      GET  /worktrees?[project|id]        — proxy to the worktree-management Fitting on its own port (default 7080)
      POST /worktrees                     — create worktree (project, task_title, branch_name?, base_branch?)
      POST /worktrees/:id/close           — merge|discard|leave_open via gh pr create
    Single-Operative mode (no GARRISON_SOULS_CONFIG): POST /chat, /chat/stream, /jobs, /attachments + GET /health. Default engine is the PTY-backed interactive claude TUI (gateway-pty.mjs); GARRISON_GATEWAY_ENGINE=sdk rolls back to the in-process Agent SDK (gateway-legacy.mjs). /chat/stream emits the same SSE shapes in both engines: open, chunk {text}, tool {name, input}, done {reply, session_id}, error.
