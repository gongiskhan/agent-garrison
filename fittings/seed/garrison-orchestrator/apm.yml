name: garrison-orchestrator
version: 0.1.0
description: Delegating Orchestrator for Agent Garrison — routes requests to Soul sub-sessions via garrison-control MCP tools.
target: claude
type: prompts
includes: auto
x-garrison:
  faculty: orchestrator
  cardinality_hint: single
  component_shape: system-prompt
  platforms:
    - claude-code
  summary: Thin routing Orchestrator that delegates to specialist Soul sub-sessions via garrison-control MCP. Does not do work itself.
  config_schema: []
  provides:
    - kind: orchestrator
      name: garrison-orchestrator
  # `any` is the discovery mechanism: every connector Fitting stationed in the
  # composition is matched here without hardcoding an id, so the runner folds
  # each connector's action catalog + `for_consumers` bash recipe into the
  # Orchestrator prompt's {{capabilities}} block. No Garrison code change is
  # needed when a new connector is added.
  consumes:
    - kind: connector
      cardinality: any
  verify:
    command: test -f apm_modules/_local/garrison-orchestrator/.apm/prompts/garrison-orchestrator.prompt.md && echo ok
    expect: ok
    timeout_ms: 10000
  for_consumers: |
    This is the Garrison Orchestrator. It routes user requests to Soul sub-sessions via the
    garrison-control MCP tools (talk_to, wait_for, list_active_sessions, end_session, list_workdirs).
    It does not perform work directly — it delegates to engineer, architect, assistant, researcher,
    or companion Souls and reports back to the user.
