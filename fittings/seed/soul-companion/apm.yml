name: soul-companion
version: 0.1.0
description: Companion Soul for Agent Garrison — quick conversational help and everyday web lookups.
target: claude
type: prompts
includes: auto
x-garrison:
  faculty: skills
  cardinality_hint: multi
  component_shape: system-prompt
  platforms:
    - claude-code
  summary: Conversational companion Soul. Light and fast — quick answers, everyday web lookups. No code or design work.
  config_schema:
    - key: base_path
      type: path
      default: "~/.garrison/companion"
      description: "Working directory for the companion Soul."
  provides:
    - kind: agent-skill
      name: soul.companion
  consumes:
    - kind: mcp-gateway
      cardinality: optional-one
  spawn:
    preset: none
    allowed_tools:
      - WebSearch
      - WebFetch
      - Read
      - Write
    disallowed_tools:
      - Bash
      - Edit
    exclude_dynamic_sections: true
    base_path: "~/.garrison/companion"
  verify:
    command: test -f apm_modules/_local/soul-companion/.apm/prompts/soul-companion.prompt.md && echo ok
    expect: ok
    timeout_ms: 10000
  for_consumers: |
    Companion Soul — spawned by the Orchestrator for quick conversational help and everyday lookups.
    Uses preset:none. Has web search and fetch; no Bash or Edit. Ephemeral by default.
