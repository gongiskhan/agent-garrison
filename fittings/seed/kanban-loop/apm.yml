name: kanban-loop
version: 0.2.0
description: Kanban Loop V1b — a workflow state machine wearing a Kanban board. Cards are work items, lists are pipeline states, an agent-list's router-prompt is the transition function. The full garrison-* pipeline (Plan → Implement → Review → Adv Review → Test → Adv Test → Walkthrough → Validate, plus Backlog/To Do/Discuss/Done/needs-attention). Composes the orchestrator (preRoute), the garrison skills, and the scheduler.
target: claude
type: hybrid
includes: auto
x-garrison:
  faculty: observability
  cardinality_hint: single
  component_shape: script
  # Own-port board UI (the kanban-board-ui slice). Garrison surfaces it at
  # /embed/kanban-loop from the status file scripts/server.mjs writes under
  # ~/.garrison/ui-fittings/kanban-loop.json. operative-bound = the runner starts
  # it during `up` and stops it during `down`.
  own_port: true
  default_port: 7089
  lifecycle: operative-bound
  platforms:
    - claude-code
  summary: >-
    A Garrison automation-runner. File-per-card board under ~/.garrison/kanban-loop
    (ULID ids, atomic writes; membership derived by scanning cards, never stored; the
    card stores POINTERS — runId/runDir/sliceId/sessionIds/briefPath/videoUrl — never
    inlined document bodies). THE run engine (GARRISON-UNIFY-V1 S4): a run is a card.
    A manual list is a plain column; an agent list maps to a PHASE NAME and nothing
    else (D15) — its skill, model, effort and runtime resolve from the compiled
    Orchestrator policy (~/.garrison/orchestrator/policy.json) at dispatch time, and
    one of three triggers (immediate | manual | scheduler-beat) decides who fires it.
    On the card's first agent-list entry the engine mints a runId + runDir and
    threads the run dir into every execute-prompt so the phase skills write per-run.
    Dispatch goes through the orchestrator front door with an explicit
    {taskType: <phase>, tier: <card tier>} classification; the router output must
    EXACTLY name one of the card's valid next lists AND the phase's durable
    gate-status entry must exist in the runDir (D9), or the card parks in
    needs-attention. Cards on autonomous lists are engine-owned (D16). The card's
    work kind + per-card phase toggles form its rail (D17): OFF phases are skipped
    with explicit off events, never silent. The Test list runs batched per project
    on its own scheduler beat (default every 5h). Goal-mode carries a
    runtime-neutral acceptance block; the convergence guard is the per-card
    iteration cap.
  config_schema:
    - key: board_dir
      type: path
      default: ~/.garrison/kanban-loop
      description: Per-machine board root (override via GARRISON_KANBAN_DIR).
    - key: iteration_cap
      type: integer
      default: 10
      description: Per-card iteration cap; a breach parks the card in needs-attention (the convergence guard).
    - key: test_beat_cron
      type: string
      default: 0 */5 * * *
      description: Cron cadence for the Test list's own scheduler beat (override via KANBAN_TEST_BEAT_CRON). Not the global heartbeat.
    - key: tick_cron
      type: string
      default: '*/2 * * * *'
      description: Cron cadence for the global tick sweeping immediate agent lists (override via KANBAN_TICK_CRON). This IS the global heartbeat.
    - key: review_cron
      type: string
      default: 0 8 * * 1
      description: Cron cadence for the weekly board review (override via KANBAN_REVIEW_CRON). Reports moving/stalled/needs-attention; never moves cards.
    - key: review_stall_hours
      type: integer
      default: 2
      description: Hours before a running or waiting card counts as stalled in the weekly review (override via KANBAN_REVIEW_STALL_HOURS).
  provides:
    - kind: automation-runner
      name: kanban-loop
  consumes:
    - kind: orchestrator
      cardinality: optional-one
  setup:
    command: node ui/build.mjs && node scripts/kanban.mjs --setup
    idempotent: true
    timeout_ms: 60000
  verify:
    command: node apm_modules/_local/kanban-loop/scripts/kanban.mjs --probe
    expect: KANBAN-OK
    timeout_ms: 10000
  for_consumers: |
    The Kanban Loop is THE run engine's window: every autonomous run is a card. A
    manual list is a plain column; an agent list maps to a phase name and nothing
    else — the executing skill, model, effort and runtime resolve from the compiled
    Orchestrator policy at dispatch time (never per-list config), the dispatch
    carries an explicit {taskType: <phase>, tier: <card tier>} classification, and
    the router output's last line must EXACTLY name one of the card's valid next
    lists AND the phase's durable gate-status entry must exist under the card's
    runDir, else the card parks in needs-attention. Cards on autonomous lists are
    engine-owned: the API and UI reject manual moves/edits (needs-attention is the
    human touchpoint). Each agent list carries one of three triggers: immediate (fires on
    entry via --tick), scheduler-beat (the Test list, batched per project on its own
    beat), or manual (advanced by hand; interactive lists like Discuss open the web
    chat). On a card's first agent-list entry the engine mints a runId + runDir
    (docs/autothing/runs/<runId>) so each card's plan and gate files do not collide; the
    card stores pointers, never copies. It does NOT own routing or skills — it sequences
    them (one skill-decider per list, one effort/model decider in the router, no
    overlap). Goal-mode cards carry a runtime-neutral acceptance block; the guard is the
    iteration cap, not a host-specific slash command or goal hook. The two adversarial
    lists are cross-model Codex passes via the codex CLI — the operative stays modest.
