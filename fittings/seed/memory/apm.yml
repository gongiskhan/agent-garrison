name: memory
version: 0.1.0
description: Memory seed for Agent Garrison.
target: claude
type: skill
includes: auto
x-garrison:
  faculty: memory
  cardinality_hint: single
  component_shape: skill
  platforms:
    - claude-code
  summary: Compiled cross-session memory backed by claude-memory-compiler (auto-captures sessions, indexes daily logs, injects index into future sessions).
  config_schema:
    - key: recency_window
      type: integer
      default: 20
      description: Number of recent events kept in immediate context.
    - key: persistence_cadence
      type: string
      default: hourly
      description: How often memory is compiled to disk.
    - key: compiled_memory_dir
      type: path
      default: ~/Projects/ekus/obsidian-vault/Compiled
      description: Directory tree of compiled memory (concepts, connections, qa). The compiler resolves $COMPILER_OUTPUT_DIR first, then this path, then $INSTALL_DIR/knowledge as legacy fallback.
    - key: compiler_repo_url
      type: string
      default: https://github.com/coleam00/claude-memory-compiler
      description: Memory-compiler git URL. Setup clones this if the install dir is missing.
  provides:
    - kind: memory-store
      name: garrison-memory
  consumes:
    - kind: vault
      cardinality: optional-one
  setup:
    command: bash scripts/setup.sh
    idempotent: true
    timeout_ms: 60000
  verify:
    command: bash apm_modules/_local/memory/scripts/verify.sh
    expect: ok
    timeout_ms: 10000
